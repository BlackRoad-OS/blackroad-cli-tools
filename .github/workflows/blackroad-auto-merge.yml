name: 🤖 BlackRoad Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  check_suite:
    types: [completed]
  workflow_run:
    workflows: ["🔍 BlackRoad Compliance Check", "Trinity Compliance Check", "Deploy to Cloudflare Pages"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  auto-merge:
    name: Auto-Merge Compliant PRs
    runs-on: ubuntu-latest

    # Run for bot-created PRs (github-actions, copilot, dependabot)
    if: |
      github.event.pull_request.user.login == 'github-actions[bot]' ||
      github.event.pull_request.user.login == 'dependabot[bot]' ||
      contains(github.event.pull_request.user.login, 'copilot') ||
      github.actor == 'github-actions[bot]'

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: 🔍 Get PR Details
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get PR number
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
          else
            # If triggered by workflow_run, find the PR
            PR_NUMBER=$(gh pr list --head blackroad-auto-fix --json number --jq '.[0].number')
          fi

          if [ -z "$PR_NUMBER" ]; then
            echo "No PR found, exiting..."
            exit 0
          fi

          echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT

          # Get PR status
          PR_DATA=$(gh pr view "$PR_NUMBER" --json statusCheckRollup,headRefName,mergeable,mergeStateStatus)

          # Extract status
          STATUS=$(echo "$PR_DATA" | jq -r '.statusCheckRollup[] | select(.conclusion != null) | .conclusion' | sort -u)
          MERGEABLE=$(echo "$PR_DATA" | jq -r '.mergeable')
          MERGE_STATE=$(echo "$PR_DATA" | jq -r '.mergeStateStatus')
          BRANCH=$(echo "$PR_DATA" | jq -r '.headRefName')

          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "mergeable=$MERGEABLE" >> $GITHUB_OUTPUT
          echo "merge_state=$MERGE_STATE" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

          echo "PR #$PR_NUMBER status: $STATUS, mergeable: $MERGEABLE, state: $MERGE_STATE"

      - name: ✅ Validate PR for Auto-Merge
        id: validate
        run: |
          CAN_MERGE="false"
          BRANCH="${{ steps.pr.outputs.branch }}"

          # Check 1: Is this from an auto-fix or bot branch?
          IS_BOT_BRANCH=false
          if [[ "$BRANCH" == "blackroad-auto-fix" ]] || \
             [[ "$BRANCH" == dependabot/* ]] || \
             [[ "$BRANCH" == copilot/* ]] || \
             [[ "$BRANCH" == bot/* ]]; then
            IS_BOT_BRANCH=true
            echo "✅ PR is from bot/automated branch: $BRANCH"
          fi

          if [[ "$IS_BOT_BRANCH" == "true" ]]; then
            # Check 2: Is mergeable?
            if [[ "${{ steps.pr.outputs.mergeable }}" == "MERGEABLE" ]]; then
              echo "✅ PR is mergeable (no conflicts)"

              # Check 3: All checks passed or no checks?
              if [[ -z "${{ steps.pr.outputs.status }}" ]] || [[ "${{ steps.pr.outputs.status }}" == "SUCCESS" ]]; then
                echo "✅ All checks passed (or no checks required)"
                CAN_MERGE="true"
              else
                echo "⚠️  Some checks failed or are pending: ${{ steps.pr.outputs.status }}"
              fi
            else
              echo "⚠️  PR has merge conflicts or is not mergeable"
            fi
          else
            echo "ℹ️  Not an automated PR (branch: $BRANCH), skipping auto-merge"
          fi

          echo "can_merge=$CAN_MERGE" >> $GITHUB_OUTPUT

      - name: 🚀 Merge PR
        if: steps.validate.outputs.can_merge == 'true' && steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.pr.outputs.number }}"

          echo "🤖 Merging PR #$PR_NUMBER..."

          MERGE_BODY="Auto-merged by BlackRoad Auto-Merge System. All compliance checks passed."

          # Merge with squash and delete branch
          gh pr merge "$PR_NUMBER" \
            --squash \
            --delete-branch \
            --body "$MERGE_BODY"

          echo "✅ PR #$PR_NUMBER merged successfully!"

      - name: 💬 Add Success Comment
        if: steps.validate.outputs.can_merge == 'true' && steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.pr.outputs.number }}"

          COMMENT_BODY="🤖 Auto-Merge Successful - This PR was auto-merged: all compliance checks passed, no merge conflicts, created by automated bot. Changes are now live. -- Automated by BlackRoad Auto-Merge System (c) 2025-2026 BlackRoad OS, Inc."

          gh pr comment "$PR_NUMBER" --body "$COMMENT_BODY" || true

      - name: 📝 Create Issue on Validation Failure
        if: |
          steps.validate.outputs.can_merge == 'false' &&
          steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.pr.outputs.number }}"
          REPO="${{ github.repository }}"
          BRANCH="${{ steps.pr.outputs.branch }}"

          # Only create issue for automated branches
          if [[ "$BRANCH" != dependabot/* ]] && [[ "$BRANCH" != copilot/* ]] && [[ "$BRANCH" != bot/* ]] && [[ "$BRANCH" != "blackroad-auto-fix" ]]; then
            echo "Skipping issue creation for non-automated branch: $BRANCH"
            exit 0
          fi

          ISSUE_BODY="Auto-Fix PR #$PR_NUMBER Requires Manual Review. Branch: ${{ steps.pr.outputs.branch }}, Mergeable: ${{ steps.pr.outputs.mergeable }}, State: ${{ steps.pr.outputs.merge_state }}, Status: ${{ steps.pr.outputs.status }}. PR: https://github.com/$REPO/pull/$PR_NUMBER"

          gh issue create \
            --title "Auto-Fix PR Requires Manual Review: #$PR_NUMBER" \
            --body "$ISSUE_BODY" \
            --label "auto-fix-failed" \
            --label "needs-review" || true

      - name: 🚨 Notify on Critical Failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🚨 Auto-merge workflow encountered an error"
          echo "This may require manual intervention"
          # If Slack webhook is configured, uncomment below:
          # curl -X POST "${{ secrets.SLACK_WEBHOOK }}" -H 'Content-Type: application/json' \
          #   -d '{"text":"🚨 Auto-merge failed in ${{ github.repository }}"}'
